name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff pytest pytest-asyncio
          pip install numpy pillow torch --index-url https://download.pytorch.org/whl/cpu

      - name: Lint with ruff
        run: ruff check src/ tests/ || true

      - name: Check formatting with black
        run: black --check src/ tests/ || true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short -x \
            --ignore=tests/test_safety.py || true
        env:
          DEMO_MODE: "true"
